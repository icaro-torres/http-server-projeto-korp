networks:
  korp-network:
    driver: bridge

services:
  http-server-projeto-korp:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: http-server-projeto-korp
    networks:
      - korp-network

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/http-server-projeto-korp.conf:/etc/nginx/conf.d/default.conf
    networks:
      - korp-network
    depends_on:
      - http-server-projeto-korp