global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'nginx_volume'
    static_configs:
      - targets: ['nginx-exporter:9113']

  - job_name: 'blackbox_disponibilidade'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets: ['http://http-server-projeto-korp:8080/projeto-korp']
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115